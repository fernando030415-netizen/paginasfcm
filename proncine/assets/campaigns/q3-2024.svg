<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800">
  <defs>
    <radialGradient id="bg-q3" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#141414"/>
      <stop offset="100%" stop-color="#040404"/>
    </radialGradient>
    <radialGradient id="glow-q3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ddd" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur-q3"><feGaussianBlur stdDeviation="28"/></filter>
  </defs>
  <rect width="600" height="800" fill="url(#bg-q3)"/>
  <rect width="600" height="800" fill="url(#glow-q3)"/>
  <ellipse cx="300" cy="400" rx="220" ry="270" fill="#1c1c1c" filter="url(#blur-q3)" opacity="0.5"/>

  <!-- Cage grid -->
  <line x1="150" y1="0" x2="150" y2="800" stroke="#fff" stroke-opacity="0.025" stroke-width="1"/>
  <line x1="300" y1="0" x2="300" y2="800" stroke="#fff" stroke-opacity="0.025" stroke-width="1"/>
  <line x1="450" y1="0" x2="450" y2="800" stroke="#fff" stroke-opacity="0.025" stroke-width="1"/>
  <line x1="0" y1="200" x2="600" y2="200" stroke="#fff" stroke-opacity="0.025" stroke-width="1"/>
  <line x1="0" y1="400" x2="600" y2="400" stroke="#fff" stroke-opacity="0.025" stroke-width="1"/>
  <line x1="0" y1="600" x2="600" y2="600" stroke="#fff" stroke-opacity="0.025" stroke-width="1"/>

  <!-- T-shirt back — person, shirt fills frame -->
  <path d="M 130 350 L 470 350 L 500 760 L 100 760 Z" fill="#080808"/>
  <path d="M 130 350 L 60 322 L 30 420 L 90 440 L 130 405 Z" fill="#080808"/>
  <path d="M 470 350 L 540 322 L 570 420 L 510 440 L 470 405 Z" fill="#080808"/>
  <path d="M 130 350 Q 165 334 300 330 Q 435 334 470 350" fill="#080808" stroke="#141414" stroke-width="1"/>
  <path d="M 130 350 L 60 322 L 30 420 L 90 440 L 130 405 L 100 760 L 500 760 L 470 405 L 510 440 L 570 420 L 540 322 L 470 350 Q 435 334 300 330 Q 165 334 130 350 Z" fill="none" stroke="#151515" stroke-width="2"/>

  <!-- PRONCINE® neck label -->
  <rect x="268" y="332" width="64" height="13" rx="2" fill="#111" stroke="#2a2a2a" stroke-width="0.8"/>
  <text x="300" y="342" font-family="Arial Narrow, sans-serif" font-size="6.5" font-weight="700" fill="#666" text-anchor="middle" letter-spacing="1.5">PRONCINE®</text>

  <!-- ® top right on shirt -->
  <text x="458" y="378" font-family="Arial, sans-serif" font-size="18" fill="#fff" fill-opacity="0.3">®</text>

  <!-- 9202 — massive back print -->
  <text x="300" y="570" font-family="'Space Grotesk', Arial Black, sans-serif" font-size="148" font-weight="900" fill="#d8d8d8" fill-opacity="0.82" text-anchor="middle" dominant-baseline="middle" letter-spacing="-6">9202</text>

  <!-- Silicone appliqué edge highlight -->
  <text x="300" y="569" font-family="'Space Grotesk', Arial Black, sans-serif" font-size="148" font-weight="900" fill="none" stroke="#fff" stroke-width="0.8" stroke-opacity="0.2" text-anchor="middle" dominant-baseline="middle" letter-spacing="-6">9202</text>

  <!-- Horizontal bar under number -->
  <line x1="100" y1="654" x2="500" y2="654" stroke="#fff" stroke-opacity="0.1" stroke-width="1.5"/>

  <!-- Quarter label -->
  <text x="50" y="68" font-family="'Space Grotesk', Arial, sans-serif" font-size="11" fill="#fff" fill-opacity="0.4" letter-spacing="5">Q3 2024</text>
  <line x1="50" y1="75" x2="175" y2="75" stroke="#fff" stroke-opacity="0.15" stroke-width="1"/>

  <line x1="50" y1="752" x2="550" y2="752" stroke="#fff" stroke-opacity="0.07" stroke-width="1"/>
  <text x="300" y="776" font-family="'Space Grotesk', Arial, sans-serif" font-size="10" fill="#fff" fill-opacity="0.18" text-anchor="middle" letter-spacing="8">PRONCINE®</text>
</svg>
