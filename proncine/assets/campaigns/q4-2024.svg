  <path d="M 402 325 L 508 325 L 520 530 L 390 530 Z" fill="#080808" stroke="#141414" stroke-width="1"/>
  <path d="M 508 325 L 545 312 L 560 362 L 528 370 L 508 348 Z" fill="#080808"/>

