  <text x="300" y="286" font-family="Arial Narrow, sans-serif" font-size="5.5" font-weight="700" fill="#555" text-anchor="middle" letter-spacing="1">PRONCINE®</text>

  <!-- Quarter label -->
  <text x="50" y="68" font-family="'Space Grotesk', Arial, sans-serif" font-size="11" fill="#fff" fill-opacity="0.4" letter-spacing="5">Q4 2024</text>
  <line x1="50" y1="75" x2="175" y2="75" stroke="#fff" stroke-opacity="0.15" stroke-width="1"/>

  <!-- Ghost text -->
  <text x="300" y="740" font-family="'Space Grotesk', Arial Black, sans-serif" font-size="68" font-weight="900" fill="#fff" fill-opacity="0.03" text-anchor="middle" letter-spacing="-2">COMUNIDAD</text>

  <line x1="50" y1="752" x2="550" y2="752" stroke="#fff" stroke-opacity="0.07" stroke-width="1"/>
  <text x="300" y="776" font-family="'Space Grotesk', Arial, sans-serif" font-size="10" fill="#fff" fill-opacity="0.18" text-anchor="middle" letter-spacing="8">PRONCINE®</text>
