  <ellipse cx="62" cy="335" rx="20" ry="18" fill="#090909"/>
  <path d="M 22 358 L 102 358 L 110 520 L 14 520 Z" fill="#070707"/>

  <!-- Person 5 (far right, very faint) -->
  <ellipse cx="538" cy="335" rx="20" ry="18" fill="#090909"/>
  <path d="M 498 358 L 578 358 L 586 520 L 490 520 Z" fill="#070707"/>

