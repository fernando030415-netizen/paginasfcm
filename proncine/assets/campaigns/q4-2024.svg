<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800">
  <defs>
    <radialGradient id="bg-q4" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#151515"/>
      <stop offset="100%" stop-color="#050505"/>
    </radialGradient>
    <filter id="blur-q4"><feGaussianBlur stdDeviation="25"/></filter>
  </defs>
  <rect width="600" height="800" fill="url(#bg-q4)"/>
  <ellipse cx="300" cy="380" rx="200" ry="250" fill="#1a1a1a" filter="url(#blur-q4)" opacity="0.5"/>

