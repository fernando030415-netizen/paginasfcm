  <!-- COMUNIDAD back print on main shirt -->
  <text x="300" y="435" font-family="'Space Grotesk', Arial Black, sans-serif" font-size="36" font-weight="900" fill="#c8c8c8" fill-opacity="0.7" text-anchor="middle">COMUNIDAD</text>
  <line x1="215" y1="445" x2="385" y2="445" stroke="#fff" stroke-opacity="0.12" stroke-width="1"/>
  <text x="300" y="462" font-family="Arial Narrow, sans-serif" font-size="10" fill="#666" fill-opacity="0.6" text-anchor="middle" letter-spacing="4">CALI — CO  2024</text>

