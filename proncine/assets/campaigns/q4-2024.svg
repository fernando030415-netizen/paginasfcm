  <path d="M 92 325 L 198 325 L 210 530 L 80 530 Z" fill="#080808" stroke="#141414" stroke-width="1"/>
  <path d="M 92 325 L 55 312 L 40 362 L 72 370 L 92 348 Z" fill="#080808"/>

