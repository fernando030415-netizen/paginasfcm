<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 625">
  <defs>
    <radialGradient id="bg-c" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#191919"/>
      <stop offset="100%" stop-color="#060606"/>
    </radialGradient>
    <filter id="blur-c"><feGaussianBlur stdDeviation="20"/></filter>
  </defs>
  <rect width="500" height="625" fill="url(#bg-c)"/>
  <ellipse cx="250" cy="290" rx="155" ry="190" fill="#252525" filter="url(#blur-c)" opacity="0.45"/>

  <!-- T-shirt body -->
  <path d="M 145 150 L 355 150 L 380 430 L 120 430 Z" fill="#0a0a0a"/>
  <path d="M 145 150 L 90 130 L 60 190 L 105 210 L 145 180 Z" fill="#0a0a0a"/>
  <path d="M 355 150 L 410 130 L 440 190 L 395 210 L 355 180 Z" fill="#0a0a0a"/>
  <path d="M 145 150 Q 170 130 200 125 Q 225 148 250 150 Q 275 148 300 125 Q 330 130 355 150" fill="#0a0a0a" stroke="#1a1a1a" stroke-width="1"/>
  <path d="M 145 150 L 90 130 L 60 190 L 105 210 L 145 180 L 120 430 L 380 430 L 355 180 L 395 210 L 440 190 L 410 130 L 355 150 L 300 125 Q 275 148 250 150 Q 225 148 200 125 Z" fill="none" stroke="#1e1e1e" stroke-width="1.5"/>

  <!-- PRONCINE® neck label -->
  <rect x="218" y="153" width="64" height="12" rx="1" fill="#141414" stroke="#2a2a2a" stroke-width="0.5"/>
  <text x="250" y="162" font-family="Arial Narrow, sans-serif" font-size="6" font-weight="700" fill="#666" text-anchor="middle" letter-spacing="1">PRONCINE®</text>

  <!-- Coin / medallion graphic — back of shirt -->
  <circle cx="250" cy="295" r="88" fill="none" stroke="#c0c0c0" stroke-width="3" stroke-opacity="0.7"/>
  <circle cx="250" cy="295" r="80" fill="none" stroke="#888" stroke-width="1" stroke-opacity="0.4"/>
  <circle cx="250" cy="295" r="74" fill="#101010" stroke="#555" stroke-width="0.5" stroke-opacity="0.3"/>

  <!-- Stars around coin edge -->
  <g fill="#a0a0a0" fill-opacity="0.6" font-size="8" font-family="Arial">
    <text x="250" y="212" text-anchor="middle">✦</text>
    <text x="326" y="248" text-anchor="middle">✦</text>
    <text x="326" y="348" text-anchor="middle">✦</text>
    <text x="250" y="384" text-anchor="middle">✦</text>
    <text x="174" y="348" text-anchor="middle">✦</text>
    <text x="174" y="248" text-anchor="middle">✦</text>
  </g>

  <!-- Cross inside coin -->
  <line x1="250" y1="232" x2="250" y2="358" stroke="#d0d0d0" stroke-width="14" stroke-opacity="0.5"/>
  <line x1="188" y1="295" x2="312" y2="295" stroke="#d0d0d0" stroke-width="14" stroke-opacity="0.5"/>
  <line x1="250" y1="232" x2="250" y2="358" stroke="#fff" stroke-width="4" stroke-opacity="0.35"/>
  <line x1="188" y1="295" x2="312" y2="295" stroke="#fff" stroke-width="4" stroke-opacity="0.35"/>

  <!-- PRONCINE® text inside coin -->
  <text x="250" y="273" font-family="'Space Grotesk', Arial, sans-serif" font-size="11" font-weight="700" fill="#c8c8c8" fill-opacity="0.8" text-anchor="middle" letter-spacing="2">PRONCINE®</text>

  <!-- 20_2E year -->
  <text x="218" y="316" font-family="Arial Narrow, sans-serif" font-size="10" fill="#888" fill-opacity="0.7" letter-spacing="1">20</text>
  <text x="272" y="316" font-family="Arial Narrow, sans-serif" font-size="10" fill="#888" fill-opacity="0.7" letter-spacing="1">2E</text>

  <!-- "it's me" script -->
  <text x="250" y="338" font-family="Georgia, serif" font-size="12" font-style="italic" fill="#aaa" fill-opacity="0.65" text-anchor="middle">"it's me"</text>

  <!-- ® top right on shirt -->
  <text x="370" y="190" font-family="Arial, sans-serif" font-size="14" fill="#fff" fill-opacity="0.35">®</text>

  <!-- Product label -->
  <text x="40" y="484" font-family="'Space Grotesk', Arial, sans-serif" font-size="17" font-weight="700" fill="#e0e0e0" letter-spacing="1">CONQUISTA</text>
  <text x="40" y="504" font-family="'Space Grotesk', Arial, sans-serif" font-size="10.5" fill="#606060" letter-spacing="3">PROTECCIÓN · FUERZA · PROPÓSITO</text>
  <line x1="40" y1="520" x2="460" y2="520" stroke="#fff" stroke-opacity="0.06" stroke-width="1"/>
  <text x="40" y="545" font-family="'Space Grotesk', Arial, sans-serif" font-size="14" font-weight="600" fill="#909090" letter-spacing="1">$250.000</text>
  <text x="460" y="545" font-family="'Space Grotesk', Arial, sans-serif" font-size="10" fill="#404040" text-anchor="end" letter-spacing="3">Q2 2025</text>
</svg>
