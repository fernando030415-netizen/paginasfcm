<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 625">
  <defs>
    <radialGradient id="bg-s" cx="50%" cy="38%" r="55%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#060606"/>
    </radialGradient>
    <filter id="blur-s"><feGaussianBlur stdDeviation="18"/></filter>
    <filter id="grain-s" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="overlay"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="500" height="625" fill="url(#bg-s)"/>

  <!-- Subtle bg glow behind tee -->
  <ellipse cx="250" cy="290" rx="160" ry="200" fill="#2a2a2a" filter="url(#blur-s)" opacity="0.5"/>

  <!-- ── T-SHIRT SHAPE ── -->
  <!-- Body -->
  <path d="M 145 150 L 355 150 L 380 430 L 120 430 Z" fill="#0a0a0a"/>
  <!-- Left shoulder + sleeve -->
  <path d="M 145 150 L 90 130 L 60 190 L 105 210 L 145 180 Z" fill="#0a0a0a"/>
  <!-- Right shoulder + sleeve -->
  <path d="M 355 150 L 410 130 L 440 190 L 395 210 L 355 180 Z" fill="#0a0a0a"/>
  <!-- Collar -->
  <path d="M 145 150 Q 170 130 200 125 Q 225 148 250 150 Q 275 148 300 125 Q 330 130 355 150"
        fill="#0a0a0a" stroke="#1a1a1a" stroke-width="1"/>
  <!-- Tee subtle outline -->
  <path d="M 145 150 L 90 130 L 60 190 L 105 210 L 145 180 L 145 150 L 355 150 L 355 180 L 395 210 L 440 190 L 410 130 L 355 150 L 300 125 Q 275 148 250 150 Q 225 148 200 125 Z"
        fill="none" stroke="#222" stroke-width="1.5"/>
  <path d="M 145 180 L 120 430 L 380 430 L 355 180" fill="none" stroke="#222" stroke-width="1"/>

  <!-- ── SÍMBOLO GRAPHIC: halftone face + cross ── -->

  <!-- Cross overlay (main graphic) -->
  <line x1="250" y1="185" x2="250" y2="390" stroke="#d0d0d0" stroke-width="28" stroke-opacity="0.55"/>
  <line x1="175" y1="265" x2="325" y2="265" stroke="#d0d0d0" stroke-width="28" stroke-opacity="0.55"/>

  <!-- Face halftone dots behind cross -->
  <g fill="#c8c8c8" fill-opacity="0.7">
    <!-- forehead -->
    <circle cx="230" cy="208" r="3.5"/><circle cx="248" cy="206" r="4"/><circle cx="266" cy="208" r="3.5"/>
    <circle cx="221" cy="218" r="3"/><circle cx="238" cy="216" r="4.5"/><circle cx="256" cy="215" r="5"/><circle cx="274" cy="216" r="4.5"/><circle cx="284" cy="219" r="3"/>
    <!-- eyes row -->
    <circle cx="215" cy="232" r="3"/><circle cx="228" cy="229" r="5"/><circle cx="241" cy="227" r="6"/>
    <circle cx="254" cy="226" r="4"/><circle cx="266" cy="227" r="6"/><circle cx="279" cy="229" r="5"/><circle cx="292" cy="232" r="3"/>
    <!-- eye pupils -->
    <circle cx="235" cy="234" r="9" fill="#0a0a0a"/><circle cx="265" cy="234" r="9" fill="#0a0a0a"/>
    <circle cx="235" cy="234" r="5.5"/><circle cx="265" cy="234" r="5.5"/>
    <!-- under eyes -->
    <circle cx="218" cy="248" r="3.5"/><circle cx="231" cy="245" r="5"/><circle cx="244" cy="244" r="5.5"/>
    <circle cx="256" cy="244" r="5.5"/><circle cx="269" cy="245" r="5"/><circle cx="282" cy="248" r="3.5"/>
    <!-- cheeks -->
    <circle cx="214" cy="262" r="3"/><circle cx="226" cy="260" r="4.5"/><circle cx="239" cy="258" r="5"/>
    <circle cx="252" cy="258" r="5.5"/><circle cx="265" cy="258" r="5"/><circle cx="278" cy="260" r="4.5"/><circle cx="290" cy="262" r="3"/>
    <!-- mouth row -->
    <circle cx="222" cy="295" r="3.5"/><circle cx="234" cy="292" r="5"/><circle cx="246" cy="291" r="5.5"/>
    <circle cx="258" cy="291" r="5.5"/><circle cx="270" cy="292" r="5"/><circle cx="282" cy="295" r="3.5"/>
    <!-- lips -->
    <circle cx="236" cy="306" r="6.5" fill="#b0b0b0"/><circle cx="250" cy="308" r="7" fill="#b0b0b0"/>
    <circle cx="264" cy="306" r="6.5" fill="#b0b0b0"/>
    <!-- chin -->
    <circle cx="238" cy="320" r="4"/><circle cx="250" cy="322" r="5"/><circle cx="262" cy="320" r="4"/>
    <circle cx="243" cy="332" r="3"/><circle cx="250" cy="334" r="3.5"/><circle cx="257" cy="332" r="3"/>
  </g>

  <!-- Cross overlay (on top of face, slightly transparent) -->
  <line x1="250" y1="185" x2="250" y2="390" stroke="#e8e8e8" stroke-width="22" stroke-opacity="0.45"/>
  <line x1="175" y1="265" x2="325" y2="265" stroke="#e8e8e8" stroke-width="22" stroke-opacity="0.45"/>

  <!-- PRONCINE® label on chest -->
  <text x="250" y="175" font-family="'Space Grotesk', Arial Narrow, sans-serif" font-size="9" font-weight="600" fill="#fff" fill-opacity="0.6" text-anchor="middle" letter-spacing="3">PRONCINE®</text>

  <!-- Fold line at bottom of tee -->
  <line x1="130" y1="425" x2="370" y2="425" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Product label -->
  <text x="40" y="484" font-family="'Space Grotesk', Arial, sans-serif" font-size="17" font-weight="700" fill="#e0e0e0" letter-spacing="1">SÍMBOLO</text>
  <text x="40" y="504" font-family="'Space Grotesk', Arial, sans-serif" font-size="10.5" fill="#606060" letter-spacing="3">100% ALGODÓN PERUANO  ·  260G</text>
  <line x1="40" y1="520" x2="460" y2="520" stroke="#fff" stroke-opacity="0.06" stroke-width="1"/>
  <text x="40" y="545" font-family="'Space Grotesk', Arial, sans-serif" font-size="14" font-weight="600" fill="#909090" letter-spacing="1">$250.000</text>
  <text x="460" y="545" font-family="'Space Grotesk', Arial, sans-serif" font-size="10" fill="#404040" text-anchor="end" letter-spacing="3">Q2 2025</text>
</svg>
